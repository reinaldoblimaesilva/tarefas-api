name: CI/CD — Build, Test e Deploy no GKE

# Dispara o pipeline quando há push na branch main
on:
  push:
    branches:
      - main

env:
  # Variáveis reutilizadas em todos os jobs
  PROJECT_ID: reinaldo-lab
  REGION: southamerica-east1
  CLUSTER: reinaldo-cluster
  REGISTRY: southamerica-east1-docker.pkg.dev/reinaldo-lab/reinaldo-repo
  IMAGE: tarefas-api
  NAMESPACE: tarefas-ns

jobs:

  # ── JOB 1: Testes ───────────────────────────────────────
  test:
    name: Rodar testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restaurar dependências
        run: dotnet restore TarefasApi.Tests/TarefasApi.Tests.csproj

      - name: Rodar testes
        run: dotnet test TarefasApi.Tests/ --no-restore --verbosity normal

  # ── JOB 2: Build e Deploy ────────────────────────────────
  build-and-deploy:
    name: Build, Push e Deploy
    runs-on: ubuntu-latest
    needs: test   # só roda se os testes passarem

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      # Autentica na GCP usando o Secret cadastrado
      - name: Autenticar na GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Instala e configura o gcloud CLI no runner
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # Configura o Docker para autenticar no Artifact Registry
      - name: Configurar Docker para GCP
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # Gera uma tag única usando o SHA do commit (ex: abc1234)
      - name: Definir tag da imagem
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      # Build da imagem Docker
      - name: Build da imagem Docker
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest \
            ./TarefasApi

      # Push das duas tags para o Artifact Registry
      - name: Push para Artifact Registry
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest

      # Obtém credenciais do cluster GKE
      - name: Conectar ao cluster GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.REGION }}

      # Aplica os manifestos (namespace, service, ingress)
      - name: Aplicar manifestos base
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      # Atualiza a imagem no Deployment (rolling update)
      - name: Deploy da nova versão
        run: |
          kubectl set image deployment/${{ env.IMAGE }} \
            ${{ env.IMAGE }}=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.IMAGE_TAG }} \
            -n ${{ env.NAMESPACE }}

      # Aguarda o rollout completar (falha o pipeline se o deploy der errado)
      - name: Aguardar rollout
        run: |
          kubectl rollout status deployment/${{ env.IMAGE }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=5m