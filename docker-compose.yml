version: '3.9'

services:
  api:
    build:
      context: ./TarefasApi
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: reinaldo
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: tarefasdb